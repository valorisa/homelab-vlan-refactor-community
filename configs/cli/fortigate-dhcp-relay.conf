# Snippet de configuration : Relais DHCP vers Windows Server 2022
# À appliquer après la création des interfaces VLAN

config system interface
    
    # Relais pour le VLAN 20 (IoT)
    edit "VLAN_20_IOT"
        set dhcp-relay-service enable
        set dhcp-relay-ip "10.20.10.10"
        set dhcp-relay-type regular
    next
    
    # Relais pour le VLAN 50 (PC)
    edit "VLAN_50_PC"
        set dhcp-relay-service enable
        set dhcp-relay-ip "10.20.10.10"
        set dhcp-relay-type regular
    next

end